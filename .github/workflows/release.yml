name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-app:
    name: Build & package EnvMatrix.app
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
          key: spm-release-${{ runner.os }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            spm-release-${{ runner.os }}-

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          # strip leading v
          VERSION="${TAG#v}"
          echo "tag=$TAG"       >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build (release, universal)
        run: |
          set -euxo pipefail
          swift build -c release --arch arm64 --arch x86_64

      - name: Assemble EnvMatrix.app bundle
        id: bundle
        run: |
          set -euxo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          BIN_PATH=$(swift build -c release --arch arm64 --arch x86_64 --show-bin-path)
          APP="EnvMatrix.app"
          rm -rf "$APP"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp "$BIN_PATH/EnvMatrix" "$APP/Contents/MacOS/EnvMatrix"
          chmod +x "$APP/Contents/MacOS/EnvMatrix"

          cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>            <string>EnvMatrix</string>
            <key>CFBundleDisplayName</key>     <string>EnvMatrix</string>
            <key>CFBundleIdentifier</key>      <string>dev.envmatrix.app</string>
            <key>CFBundleExecutable</key>      <string>EnvMatrix</string>
            <key>CFBundlePackageType</key>     <string>APPL</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
            <key>CFBundleVersion</key>         <string>${VERSION}</string>
            <key>LSMinimumSystemVersion</key>  <string>13.0</string>
            <key>NSHighResolutionCapable</key> <true/>
            <key>LSApplicationCategoryType</key><string>public.app-category.developer-tools</string>
          </dict>
          </plist>
          PLIST

          ZIP="EnvMatrix-${VERSION}-macOS-universal.zip"
          /usr/bin/ditto -c -k --sequesterRsrc --keepParent "$APP" "$ZIP"
          shasum -a 256 "$ZIP" | tee "$ZIP.sha256"

          echo "zip=$ZIP"           >> "$GITHUB_OUTPUT"
          echo "sha=$ZIP.sha256"    >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EnvMatrix-macOS
          path: |
            ${{ steps.bundle.outputs.zip }}
            ${{ steps.bundle.outputs.sha }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: EnvMatrix ${{ steps.version.outputs.tag }}
          tag_name: ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            ${{ steps.bundle.outputs.zip }}
            ${{ steps.bundle.outputs.sha }}
