name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test (macOS 14, Xcode 15)
    runs-on: macos-14
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build (debug)
        run: swift build -v

      - name: Run tests
        run: swift test --parallel --enable-code-coverage

      - name: Export coverage summary
        if: always()
        run: |
          set -euo pipefail
          BIN=$(swift build --show-bin-path)
          PROF="$BIN/codecov/default.profdata"
          if [ -f "$PROF" ]; then
            XCTEST=$(ls "$BIN"/*.xctest/Contents/MacOS/* 2>/dev/null | head -n1 || true)
            if [ -n "$XCTEST" ] && [ -f "$XCTEST" ]; then
              xcrun llvm-cov report \
                -instr-profile="$PROF" \
                "$XCTEST" \
                -ignore-filename-regex='.build|Tests' \
                | tee coverage-summary.txt
            else
              echo "xctest binary not found; skipping coverage report" | tee coverage-summary.txt
            fi
          else
            echo "profdata not found at $PROF" | tee coverage-summary.txt
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: coverage-summary.txt
          if-no-files-found: ignore
